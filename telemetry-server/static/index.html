<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E-Racing Telemetria V2</title>
<style>
  :root {
    --bg:      #0f1117;
    --bg2:     #1a1d27;
    --bg3:     #22263a;
    --border:  rgba(255,255,255,0.08);
    --text:    #e8eaf0;
    --text2:   #8b92a8;
    --accent:  #1fb68e;
    --red:     #e05252;
    --blue:    #3d8ef0;
    --amber:   #e09b2f;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: system-ui, -apple-system, sans-serif;
    font-size: 14px;
    min-height: 100vh;
  }

  /* ── LOGIN ── */
  #login-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
  }
  .login-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 40px 36px;
    width: 100%;
    max-width: 380px;
  }
  .login-card h1 {
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .login-card .subtitle {
    color: var(--text2);
    font-size: 13px;
    margin-bottom: 32px;
  }
  .field {
    margin-bottom: 16px;
  }
  .field label {
    display: block;
    font-size: 12px;
    color: var(--text2);
    margin-bottom: 6px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .field input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 11px 14px;
    color: var(--text);
    font-size: 14px;
    outline: none;
    transition: border-color 0.15s;
  }
  .field input:focus { border-color: var(--accent); }
  .btn-login {
    width: 100%;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 12px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
    transition: opacity 0.15s;
  }
  .btn-login:hover { opacity: 0.88; }
  .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }
  .error-msg {
    background: rgba(224,82,82,0.12);
    border: 1px solid rgba(224,82,82,0.3);
    border-radius: 6px;
    color: var(--red);
    font-size: 13px;
    padding: 10px 14px;
    margin-top: 14px;
    display: none;
  }
  .login-footer {
    color: var(--text2);
    font-size: 11px;
    text-align: center;
    margin-top: 24px;
  }

  /* ── DASHBOARD ── */
  #dashboard-screen { display: none; flex-direction: column; min-height: 100vh; }
  .topbar {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .topbar-left { display: flex; align-items: center; gap: 12px; }
  .topbar h2 { font-size: 16px; font-weight: 600; }
  .ws-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 20px;
    background: rgba(255,255,255,0.05);
  }
  .ws-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--text2);
    transition: background 0.3s;
  }
  .ws-dot.connected { background: var(--accent); }
  .ws-dot.error     { background: var(--red); }
  .btn-logout {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text2);
    font-size: 12px;
    padding: 6px 12px;
    cursor: pointer;
  }
  .btn-logout:hover { border-color: var(--red); color: var(--red); }

  .stats-bar {
    padding: 10px 20px;
    display: flex;
    gap: 20px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    color: var(--text2);
  }
  .stats-bar span { color: var(--text); }

  .table-wrap {
    flex: 1;
    overflow: auto;
    padding: 16px 20px;
  }
  table {
    width: 100%;
    border-collapse: collapse;
  }
  thead th {
    text-align: left;
    padding: 8px 12px;
    font-size: 11px;
    font-weight: 500;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
    position: sticky;
    top: 0;
  }
  tbody tr {
    border-bottom: 1px solid rgba(255,255,255,0.04);
    transition: background 0.1s;
  }
  tbody tr:hover { background: rgba(255,255,255,0.03); }
  tbody tr.new-row { animation: flash 0.4s ease-out; }
  @keyframes flash {
    from { background: rgba(31,182,142,0.15); }
    to   { background: transparent; }
  }
  tbody td {
    padding: 9px 12px;
    font-size: 13px;
  }
  .td-signal { font-weight: 500; color: var(--text); font-family: monospace; }
  .td-value  { color: var(--accent); font-weight: 600; font-family: monospace; }
  .td-unit   { color: var(--text2); font-size: 11px; }
  .td-device { color: var(--blue); font-size: 11px; }
  .td-time   { color: var(--text2); font-size: 11px; font-family: monospace; }
  .td-canid  { color: var(--amber); font-size: 11px; font-family: monospace; }

  .empty-state {
    text-align: center;
    color: var(--text2);
    padding: 60px 20px;
    font-size: 14px;
  }

  /* Mobile */
  @media (max-width: 600px) {
    .topbar { padding: 12px 14px; }
    .stats-bar { padding: 8px 14px; gap: 12px; flex-wrap: wrap; }
    .table-wrap { padding: 8px 14px; }
    .td-canid, .td-device { display: none; }
  }
</style>
</head>
<body>

<!-- ── LOGIN ──────────────────────────────────────────────── -->
<div id="login-screen">
  <div class="login-card">
    <h1>E-Racing Telemetria</h1>
    <p class="subtitle">Versão 2.1 · Interface Web</p>

    <div class="field">
      <label>Usuário</label>
      <input type="text" id="username" placeholder="eracing" autocomplete="username">
    </div>
    <div class="field">
      <label>Senha</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>

    <button class="btn-login" id="btn-login" onclick="doLogin()">Entrar</button>
    <div class="error-msg" id="error-msg"></div>
  </div>
  <p class="login-footer">Servidor: <span id="server-addr"></span></p>
</div>

<!-- ── DASHBOARD ──────────────────────────────────────────── -->
<div id="dashboard-screen">
  <div class="topbar">
    <div class="topbar-left">
      <h2>Telemetria em tempo real</h2>
      <div class="ws-badge">
        <div class="ws-dot" id="ws-dot"></div>
        <span id="ws-status">desconectado</span>
      </div>
    </div>
    <button class="btn-logout" onclick="doLogout()">Sair</button>
  </div>

  <div class="stats-bar">
    <div>Mensagens: <span id="stat-total">0</span></div>
    <div>Taxa: <span id="stat-rate">0</span>/s</div>
    <div>Última: <span id="stat-last">—</span></div>
  </div>

  <div class="table-wrap">
    <table id="data-table">
      <thead>
        <tr>
          <th>Sinal</th>
          <th>Valor</th>
          <th>Unidade</th>
          <th>Horário</th>
          <th>Dispositivo</th>
          <th>CAN ID</th>
        </tr>
      </thead>
      <tbody id="data-body">
        <tr><td colspan="6" class="empty-state">Aguardando dados...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
// ── Configuração ──────────────────────────────────────────
const SERVER_HOST = window.location.hostname || '192.168.1.100';
const SERVER_PORT = window.location.port || '8081';
const API_BASE    = `http://${SERVER_HOST}:${SERVER_PORT}`;
const WS_URL      = `ws://${SERVER_HOST}:${SERVER_PORT}/ws`;
const MAX_ROWS    = 100;

// ── Estado ───────────────────────────────────────────────
let ws = null;
let totalMsgs = 0;
let msgLastSecond = 0;
let rateInterval = null;

// ── Init ─────────────────────────────────────────────────
document.getElementById('server-addr').textContent = `${SERVER_HOST}:${SERVER_PORT}`;

// Enter no campo de senha faz login
document.getElementById('password').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});
document.getElementById('username').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('password').focus();
});

// Verifica se já tem token válido
(function checkExistingToken() {
  const token = localStorage.getItem('jwt');
  if (!token) return;
  // Decodifica payload sem verificar assinatura (só para checar expiração)
  try {
    const payload = JSON.parse(atob(token.split('.')[1]));
    if (payload.exp * 1000 > Date.now()) {
      showDashboard();
      connectWebSocket(token);
    } else {
      localStorage.removeItem('jwt');
    }
  } catch (_) {
    localStorage.removeItem('jwt');
  }
})();

// ── Login ─────────────────────────────────────────────────
async function doLogin() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const btn      = document.getElementById('btn-login');
  const errDiv   = document.getElementById('error-msg');

  if (!username || !password) {
    showError('Preencha usuário e senha.');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Entrando...';
  errDiv.style.display = 'none';

  try {
    const res = await fetch(`${API_BASE}/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }),
    });

    const data = await res.json();

    if (data.ok && data.token) {
      localStorage.setItem('jwt', data.token);
      showDashboard();
      connectWebSocket(data.token);
    } else {
      showError(data.message || 'Credenciais inválidas.');
    }
  } catch (err) {
    showError('Servidor inacessível. Verifique a rede.');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Entrar';
  }
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.style.display = 'block';
}

// ── Logout ────────────────────────────────────────────────
function doLogout() {
  localStorage.removeItem('jwt');
  if (ws) { ws.close(); ws = null; }
  if (rateInterval) { clearInterval(rateInterval); rateInterval = null; }
  document.getElementById('data-body').innerHTML =
    '<tr><td colspan="6" class="empty-state">Aguardando dados...</td></tr>';
  totalMsgs = 0;
  document.getElementById('dashboard-screen').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
}

// ── Mostrar dashboard ─────────────────────────────────────
function showDashboard() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('dashboard-screen').style.display = 'flex';

  // Contador de taxa (msgs/s)
  rateInterval = setInterval(() => {
    document.getElementById('stat-rate').textContent = msgLastSecond;
    msgLastSecond = 0;
  }, 1000);
}

// ── WebSocket ─────────────────────────────────────────────
function connectWebSocket(token) {
  if (ws) ws.close();

  setWsStatus('conectando...', '');

  // Token no header via protocolo WebSocket — padrão suportado pelo servidor
  ws = new WebSocket(WS_URL, []);

  // Nota: browsers não permitem headers custom no WebSocket por segurança.
  // Alternativa: mandar token como subprotocol ou no primeiro frame.
  // Nossa implementação servidor aceita token no Authorization header —
  // para browser, mandamos no primeiro frame após conexão.
  ws.onopen = () => {
    // Envia token como primeiro frame de autenticação
    ws.send(JSON.stringify({ type: 'auth', token }));
    setWsStatus('conectado', 'connected');
  };

  ws.onmessage = (event) => {
    try {
      const signal = JSON.parse(event.data);
      // Ignora ACKs de auth
      if (signal.type === 'auth_ok') return;
      addRow(signal);
      totalMsgs++;
      msgLastSecond++;
      document.getElementById('stat-total').textContent = totalMsgs;
      document.getElementById('stat-last').textContent = new Date().toLocaleTimeString();
    } catch (_) {}
  };

  ws.onclose = () => {
    setWsStatus('desconectado', 'error');
    // Reconecta em 3s se ainda tiver token
    const token = localStorage.getItem('jwt');
    if (token) setTimeout(() => connectWebSocket(token), 3000);
  };

  ws.onerror = () => setWsStatus('erro', 'error');
}

function setWsStatus(text, dotClass) {
  document.getElementById('ws-status').textContent = text;
  const dot = document.getElementById('ws-dot');
  dot.className = 'ws-dot ' + dotClass;
}

// ── Adicionar linha na tabela ─────────────────────────────
function addRow(signal) {
  const tbody = document.getElementById('data-body');

  // Remove estado vazio
  const empty = tbody.querySelector('.empty-state');
  if (empty) empty.parentElement.remove();

  // Formata timestamp (Unix float → hora local)
  const ts = new Date(signal.timestamp * 1000).toLocaleTimeString('pt-BR', {
    hour: '2-digit', minute: '2-digit', second: '2-digit', fractionalSecondDigits: 1
  });

  // Formata valor
  const val = typeof signal.value === 'number'
    ? (Number.isInteger(signal.value) ? signal.value : signal.value.toFixed(3))
    : signal.value;

  // Formata CAN ID em hex
  const canId = signal.can_id
    ? '0x' + signal.can_id.toString(16).toUpperCase().padStart(8, '0')
    : '—';

  const tr = document.createElement('tr');
  tr.className = 'new-row';
  tr.innerHTML = `
    <td class="td-signal">${escHtml(signal.signal_name)}</td>
    <td class="td-value">${val}</td>
    <td class="td-unit">${escHtml(signal.unit || '—')}</td>
    <td class="td-time">${ts}</td>
    <td class="td-device">${escHtml(signal.device_id || '—')}</td>
    <td class="td-canid">${canId}</td>
  `;

  // Insere no topo
  tbody.insertBefore(tr, tbody.firstChild);

  // Mantém no máximo MAX_ROWS linhas
  while (tbody.rows.length > MAX_ROWS) {
    tbody.deleteRow(tbody.rows.length - 1);
  }
}

function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}
</script>
</body>
</html>
